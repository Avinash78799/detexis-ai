<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sign Up | Detexis AI</title>
  <meta name="description" content="Create an account for Detexis AI to start analyzing network threats.">
  <meta name="keywords" content="intrusion detection, register, signup, security registration, Detexis">

  <!-- Favicons -->
  <link href="../static/assets/img/favicon.png" rel="icon">
  <link href="../static/assets/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

  <!-- Vendor CSS Files -->
  <link href="../static/assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../static/assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../static/assets/vendor/aos/aos.css" rel="stylesheet">
  <link href="../static/assets/vendor/glightbox/css/glightbox.min.css" rel="stylesheet">
  <link href="../static/assets/vendor/swiper/swiper-bundle.min.css" rel="stylesheet">

  <!-- Main CSS File -->
  <link href="../static/assets/css/main.css" rel="stylesheet">

</head>

<body class="signup-page" style="background: linear-gradient(135deg, #4caf50, #2196f3); color: white; min-height: 100vh;">

  <header id="header" class="header d-flex align-items-center sticky-top bg-transparent">
    <div class="container-fluid container-xl position-relative d-flex align-items-center">
      <a href="/" class="logo d-flex align-items-center me-auto text-decoration-none">
        <h1 class="sitename text-white m-0">Detexis</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>
    </div>
  </header>

  <main class="main">
    <section id="signup" class="signup section bg-transparent py-5">
      <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row justify-content-center">
          <div class="col-lg-5 col-md-8">
            <div class="card shadow-lg p-4 rounded-4 border-0" style="background: rgba(255, 255, 255, 0.95); color: #333; backdrop-filter: blur(10px);">
              
              <div class="text-center mb-4" data-aos="zoom-in">
                <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 rounded-circle p-3 mb-2" style="width: 80px; height: 80px;">
                  <i class="bi bi-shield-plus text-primary" style="font-size: 2.5rem;"></i>
                </div>
                <h4 class="fw-bold text-dark m-0">Detexis AI</h4>
                <p class="text-muted small">Register Enterprise Admin Account</p>
                <h2 class="text-primary fw-bold mt-2 mb-0">Sign Up</h2>
              </div>

              {% if message %}
              <div class="alert alert-danger rounded-3" role="alert" data-aos="fade-up">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ message }}
              </div>
              {% endif %}

              <form action="/signup" method="POST">
                <div class="form-group mb-3" data-aos="fade-up" data-aos-delay="100">
                  <label for="user" class="fw-semibold mb-1 text-secondary">Username</label>
                  <div class="input-group">
                    <span class="input-group-text border-end-0 bg-transparent text-secondary"><i class="bi bi-person-badge-fill"></i></span>
                    <input type="text" id="user" name="user" class="form-control border-start-0 ps-0" placeholder="Enter your username" required>
                  </div>
                </div>

                <div class="form-group mb-3" data-aos="fade-up" data-aos-delay="200">
                  <label for="name" class="fw-semibold mb-1 text-secondary">Full Name</label>
                  <div class="input-group">
                    <span class="input-group-text border-end-0 bg-transparent text-secondary"><i class="bi bi-person-fill"></i></span>
                    <input type="text" id="name" name="name" class="form-control border-start-0 ps-0" placeholder="Enter your full name" required>
                  </div>
                </div>

                <div class="form-group mb-3" data-aos="fade-up" data-aos-delay="300">
                  <label for="email" class="fw-semibold mb-1 text-secondary">Email</label>
                  <div class="input-group">
                    <span class="input-group-text border-end-0 bg-transparent text-secondary"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" id="email" name="email" class="form-control border-start-0 ps-0" placeholder="Enter your email" required>
                  </div>
                </div>

                <div class="form-group mb-3" data-aos="fade-up" data-aos-delay="400">
                  <label for="mobile" class="fw-semibold mb-1 text-secondary">Mobile Number</label>
                  <div class="input-group">
                    <span class="input-group-text border-end-0 bg-transparent text-secondary"><i class="bi bi-telephone-fill"></i></span>
                    <input type="tel" id="mobile" name="mobile" class="form-control border-start-0 ps-0" placeholder="Enter your mobile number" required>
                  </div>
                </div>

                <div class="form-group mb-4" data-aos="fade-up" data-aos-delay="500">
                  <label for="password" class="fw-semibold mb-1 text-secondary">Password</label>
                  <div class="input-group">
                    <span class="input-group-text border-end-0 bg-transparent text-secondary"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" id="password" name="password" class="form-control border-start-0 ps-0" placeholder="Enter your password" required>
                  </div>
                </div>

                <div class="text-center" data-aos="zoom-in" data-aos-delay="600">
                  <button type="submit" class="btn btn-primary btn-lg w-100 py-2.5 rounded-3 fw-bold shadow-sm" style="background: linear-gradient(45deg, #10bc69, #0d6efd); border: 0;">
                    <i class="bi bi-person-plus-fill me-2"></i> Sign Up
                  </button>
                </div>
              </form>

              <p class="text-center mt-4 mb-0 text-muted" data-aos="fade-up" data-aos-delay="700">
                Already have an account? <a href="/login" class="text-primary fw-semibold text-decoration-none">Sign In</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i class="bi bi-arrow-up-short"></i></a>

  <!-- Preloader -->
  <div id="preloader"></div>

  <!-- Vendor JS Files -->
  <script src="../static/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../static/assets/vendor/php-email-form/validate.js"></script>
  <script src="../static/assets/vendor/aos/aos.js"></script>
  <script src="../static/assets/vendor/glightbox/js/glightbox.min.js"></script>
  <script src="../static/assets/vendor/purecounter/purecounter_vanilla.js"></script>
  <script src="../static/assets/vendor/imagesloaded/imagesloaded.pkgd.min.js"></script>
  <script src="../static/assets/vendor/isotope-layout/isotope.pkgd.min.js"></script>
  <script src="../static/assets/vendor/swiper/swiper-bundle.min.js"></script>

  <!-- Main JS File -->
  <script src="../static/assets/js/main.js"></script>

</body>

</html>
